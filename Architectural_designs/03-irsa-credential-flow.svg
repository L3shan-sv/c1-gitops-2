<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">IRSA — IAM Roles for Service Accounts</text>
  <text x="450" y="46" font-size="11" fill="#888780" text-anchor="middle">No static AWS credentials anywhere in the system</text>

  <!-- EKS OIDC Provider -->
  <rect x="30" y="70" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="130" y="93" font-size="12" font-weight="500" fill="#0C447C" text-anchor="middle">EKS OIDC Provider</text>
  <text x="130" y="111" font-size="10" fill="#185FA5" text-anchor="middle">Federates K8s SA identity</text>

  <!-- Pod with SA -->
  <rect x="30" y="200" width="200" height="100" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="130" y="222" font-size="12" font-weight="500" fill="#412402" text-anchor="middle">Pod</text>
  <rect x="46" y="230" width="168" height="28" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="130" y="248" font-size="10" fill="#412402" text-anchor="middle">ServiceAccount: myapp</text>
  <rect x="46" y="262" width="168" height="28" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="130" y="280" font-size="10" fill="#412402" text-anchor="middle">eks.amazonaws.com/role-arn: arn</text>

  <!-- AWS STS -->
  <rect x="350" y="70" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="450" y="93" font-size="12" font-weight="500" fill="#0C447C" text-anchor="middle">AWS STS</text>
  <text x="450" y="111" font-size="10" fill="#185FA5" text-anchor="middle">AssumeRoleWithWebIdentity</text>

  <!-- IAM Roles -->
  <rect x="670" y="50" width="200" height="380" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="770" y="74" font-size="12" font-weight="500" fill="#085041" text-anchor="middle">IAM Roles (IRSA)</text>

  <rect x="686" y="84" width="168" height="44" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="770" y="102" font-size="11" font-weight="500" fill="#04342C" text-anchor="middle">myapp-role</text>
  <text x="770" y="118" font-size="10" fill="#085041" text-anchor="middle">CloudWatch · S3 read</text>

  <rect x="686" y="144" width="168" height="44" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="770" y="162" font-size="11" font-weight="500" fill="#04342C" text-anchor="middle">jenkins-agent-role</text>
  <text x="770" y="178" font-size="10" fill="#085041" text-anchor="middle">ECR push · pull</text>

  <rect x="686" y="204" width="168" height="44" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="770" y="222" font-size="11" font-weight="500" fill="#04342C" text-anchor="middle">image-updater-role</text>
  <text x="770" y="238" font-size="10" fill="#085041" text-anchor="middle">ECR read only</text>

  <rect x="686" y="264" width="168" height="44" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="770" y="282" font-size="11" font-weight="500" fill="#04342C" text-anchor="middle">alb-controller-role</text>
  <text x="770" y="298" font-size="10" fill="#085041" text-anchor="middle">ELB · EC2 describe</text>

  <rect x="686" y="324" width="168" height="44" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="770" y="342" font-size="11" font-weight="500" fill="#04342C" text-anchor="middle">vault-role</text>
  <text x="770" y="358" font-size="10" fill="#085041" text-anchor="middle">KMS encrypt · decrypt</text>

  <rect x="686" y="384" width="168" height="36" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="770" y="402" font-size="11" font-weight="500" fill="#04342C" text-anchor="middle">atlantis-role</text>
  <text x="770" y="416" font-size="10" fill="#085041" text-anchor="middle">Terraform infra scope</text>

  <!-- Temp credentials box -->
  <rect x="340" y="200" width="220" height="80" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="450" y="224" font-size="12" font-weight="500" fill="#085041" text-anchor="middle">Temp STS Credentials</text>
  <text x="450" y="242" font-size="10" fill="#0F6E56" text-anchor="middle">AccessKeyId (short-lived)</text>
  <text x="450" y="258" font-size="10" fill="#0F6E56" text-anchor="middle">Expiry: 1 hour · auto-rotated</text>
  <text x="450" y="274" font-size="10" fill="#0F6E56" text-anchor="middle">No static keys ever committed</text>

  <!-- Trust policy note -->
  <rect x="200" y="350" width="360" height="76" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="380" y="372" font-size="11" font-weight="500" fill="#444441" text-anchor="middle">IAM Trust Policy condition</text>
  <text x="380" y="390" font-size="10" fill="#5F5E5A" text-anchor="middle">StringEquals: system:serviceaccount:&lt;ns&gt;:&lt;sa&gt;</text>
  <text x="380" y="408" font-size="10" fill="#5F5E5A" text-anchor="middle">Role can only be assumed by the exact SA in the exact namespace</text>

  <!-- Flow arrows -->
  <!-- Pod SA JWT → OIDC -->
  <path d="M130 200 L130 128" stroke="#EF9F27" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <text x="138" y="168" font-size="10" fill="#633806">SA JWT token</text>

  <!-- OIDC → STS -->
  <line x1="230" y1="98" x2="348" y2="98" stroke="#378ADD" stroke-width="1.2" fill="none" marker-end="url(#arr-blue)"/>
  <text x="289" y="90" font-size="10" fill="#185FA5" text-anchor="middle">validates</text>

  <!-- STS → temp creds -->
  <line x1="450" y1="126" x2="450" y2="198" stroke="#1D9E75" stroke-width="1.2" fill="none" marker-end="url(#arr-teal)"/>
  <text x="458" y="166" font-size="10" fill="#0F6E56">issues</text>

  <!-- Temp creds → pod -->
  <path d="M340 240 L232 260" stroke="#1D9E75" stroke-width="1.2" fill="none" marker-end="url(#arr-teal)"/>
  <text x="278" y="240" font-size="10" fill="#0F6E56" text-anchor="middle">injected by</text>
  <text x="278" y="252" font-size="10" fill="#0F6E56" text-anchor="middle">pod identity webhook</text>

  <!-- STS → IAM roles -->
  <line x1="550" y1="98" x2="668" y2="200" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" fill="none" marker-end="url(#arr)"/>
  <text x="614" y="148" font-size="10" fill="#5F5E5A" text-anchor="middle">assumes</text>

  <text x="450" y="472" font-size="12" font-weight="500" fill="#5F5E5A" text-anchor="middle">IRSA credential flow — pod SA identity → OIDC federation → STS temp tokens</text>
</svg>
