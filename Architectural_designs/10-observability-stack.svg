<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#639922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="26" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Observability stack</text>

  <!-- Application pods (sources) -->
  <rect x="30" y="50" width="160" height="200" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="110" y="72" font-size="11" font-weight="500" fill="#412402" text-anchor="middle">Application pods</text>
  <rect x="46" y="80" width="128" height="30" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="110" y="99" font-size="10" fill="#412402" text-anchor="middle">myapp:8080 /metrics</text>
  <rect x="46" y="116" width="128" height="30" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="110" y="135" font-size="10" fill="#412402" text-anchor="middle">structured JSON logs</text>
  <rect x="46" y="152" width="128" height="30" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="110" y="171" font-size="10" fill="#412402" text-anchor="middle">/health readiness</text>
  <rect x="46" y="188" width="128" height="30" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="110" y="207" font-size="10" fill="#412402" text-anchor="middle">app_requests_total</text>
  <rect x="46" y="224" width="128" height="20" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="110" y="238" font-size="10" fill="#412402" text-anchor="middle">http_request_duration</text>

  <!-- Fluent Bit -->
  <rect x="240" y="170" width="150" height="80" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="315" y="192" font-size="11" font-weight="500" fill="#27500A" text-anchor="middle">Fluent Bit</text>
  <text x="315" y="210" font-size="10" fill="#3B6D11" text-anchor="middle">DaemonSet — all nodes</text>
  <text x="315" y="226" font-size="10" fill="#3B6D11" text-anchor="middle">parses JSON logs</text>
  <text x="315" y="240" font-size="10" fill="#3B6D11" text-anchor="middle">ships to CloudWatch</text>

  <!-- CloudWatch -->
  <rect x="440" y="170" width="160" height="80" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="520" y="192" font-size="11" font-weight="500" fill="#0C447C" text-anchor="middle">CloudWatch Logs</text>
  <text x="520" y="210" font-size="10" fill="#185FA5" text-anchor="middle">log group retention</text>
  <text x="520" y="226" font-size="10" fill="#185FA5" text-anchor="middle">/aws/eks/myapp/dev</text>
  <text x="520" y="242" font-size="10" fill="#185FA5" text-anchor="middle">structured log queries</text>

  <!-- Prometheus -->
  <rect x="240" y="50" width="200" height="100" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="340" y="72" font-size="11" font-weight="500" fill="#27500A" text-anchor="middle">Prometheus</text>
  <text x="340" y="90" font-size="10" fill="#3B6D11" text-anchor="middle">scrape interval: 15s</text>
  <text x="340" y="106" font-size="10" fill="#3B6D11" text-anchor="middle">retention: 15 days</text>
  <text x="340" y="122" font-size="10" fill="#3B6D11" text-anchor="middle">evaluates alert rules</text>
  <text x="340" y="138" font-size="10" fill="#3B6D11" text-anchor="middle">queries canary analysis</text>

  <!-- Grafana -->
  <rect x="490" y="50" width="190" height="100" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="585" y="72" font-size="11" font-weight="500" fill="#27500A" text-anchor="middle">Grafana</text>
  <text x="585" y="90" font-size="10" fill="#3B6D11" text-anchor="middle">DORA dashboard</text>
  <text x="585" y="106" font-size="10" fill="#3B6D11" text-anchor="middle">deployment frequency</text>
  <text x="585" y="122" font-size="10" fill="#3B6D11" text-anchor="middle">lead time · CFR · MTTR</text>
  <text x="585" y="138" font-size="10" fill="#3B6D11" text-anchor="middle">Prometheus datasource</text>

  <!-- AlertManager -->
  <rect x="730" y="50" width="140" height="200" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="800" y="72" font-size="11" font-weight="500" fill="#712B13" text-anchor="middle">AlertManager</text>
  <rect x="746" y="80" width="108" height="30" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text x="800" y="99" font-size="10" fill="#4A1B0C" text-anchor="middle">grouping</text>
  <rect x="746" y="116" width="108" height="30" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text x="800" y="135" font-size="10" fill="#4A1B0C" text-anchor="middle">inhibition rules</text>
  <rect x="746" y="152" width="108" height="30" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text x="800" y="171" font-size="10" fill="#4A1B0C" text-anchor="middle">PagerDuty (crit)</text>
  <rect x="746" y="188" width="108" height="30" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text x="800" y="207" font-size="10" fill="#4A1B0C" text-anchor="middle">Slack (warning)</text>
  <rect x="746" y="224" width="108" height="20" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text x="800" y="238" font-size="10" fill="#4A1B0C" text-anchor="middle">RolloutAborted alert</text>

  <!-- Alert rules box -->
  <rect x="240" y="300" width="440" height="140" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="460" y="322" font-size="11" font-weight="500" fill="#444441" text-anchor="middle">Key alert rules (prometheus/configmap.yaml)</text>

  <rect x="256" y="330" width="190" height="26" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="351" y="347" font-size="10" fill="#791F1F" text-anchor="middle">RolloutAborted — severity: critical</text>
  <rect x="454" y="330" width="210" height="26" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="559" y="347" font-size="10" fill="#791F1F" text-anchor="middle">PodCrashLooping — severity: critical</text>

  <rect x="256" y="362" width="190" height="26" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="351" y="379" font-size="10" fill="#412402" text-anchor="middle">HighErrorRate ≥1% — warning</text>
  <rect x="454" y="362" width="210" height="26" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="559" y="379" font-size="10" fill="#412402" text-anchor="middle">HPAMaxReplicas reached — warning</text>

  <rect x="256" y="394" width="190" height="26" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="351" y="411" font-size="10" fill="#412402" text-anchor="middle">P99Latency &gt; 500ms — warning</text>
  <rect x="454" y="394" width="210" height="26" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="559" y="411" font-size="10" fill="#412402" text-anchor="middle">NodeNotReady — severity: critical</text>

  <text x="460" y="430" font-size="10" fill="#888780" text-anchor="middle">same success_rate + p99 queries used in both alert rules and canary AnalysisTemplate</text>

  <!-- Arrows -->
  <line x1="190" y1="135" x2="238" y2="100" stroke="#639922" stroke-width="1" fill="none" marker-end="url(#arr-green)"/>
  <text x="198" y="118" font-size="9" fill="#3B6D11">scrape</text>
  <line x1="190" y1="200" x2="238" y2="200" stroke="#639922" stroke-width="1" fill="none" marker-end="url(#arr-green)"/>
  <line x1="390" y1="200" x2="438" y2="200" stroke="#639922" stroke-width="1" fill="none" marker-end="url(#arr-green)"/>
  <line x1="440" y1="100" x2="488" y2="100" stroke="#639922" stroke-width="1" fill="none" marker-end="url(#arr-green)"/>
  <line x1="340" y1="150" x2="730" y2="150" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arr-red)"/>
  <text x="535" y="145" font-size="9" fill="#A32D2D" text-anchor="middle">firing alerts</text>
  <line x1="340" y1="150" x2="340" y2="298" stroke="#639922" stroke-width="0.8" stroke-dasharray="3 2" fill="none" marker-end="url(#arr-green)"/>

  <text x="450" y="466" font-size="12" font-weight="500" fill="#5F5E5A" text-anchor="middle">Observability — Prometheus scraping, Grafana DORA metrics, AlertManager routing</text>
</svg>
