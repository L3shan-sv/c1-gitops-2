<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="26" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Terraform module layout + Atlantis PR flow</text>

  <!-- Environments row -->
  <rect x="30" y="44" width="200" height="100" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="130" y="66" font-size="12" font-weight="500" fill="#27500A" text-anchor="middle">environments/dev</text>
  <text x="130" y="84" font-size="10" fill="#3B6D11" text-anchor="middle">10.0.0.0/16</text>
  <text x="130" y="100" font-size="10" fill="#3B6D11" text-anchor="middle">t3.medium · 1–3 nodes</text>
  <text x="130" y="116" font-size="10" fill="#3B6D11" text-anchor="middle">single NAT · 1 replica Vault</text>
  <text x="130" y="132" font-size="10" fill="#3B6D11" text-anchor="middle">terraform apply (manual ok)</text>

  <rect x="350" y="44" width="200" height="100" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="450" y="66" font-size="12" font-weight="500" fill="#412402" text-anchor="middle">environments/staging</text>
  <text x="450" y="84" font-size="10" fill="#633806" text-anchor="middle">10.1.0.0/16</text>
  <text x="450" y="100" font-size="10" fill="#633806" text-anchor="middle">t3.medium · 2–5 nodes</text>
  <text x="450" y="116" font-size="10" fill="#633806" text-anchor="middle">single NAT · 3 replica Vault</text>
  <text x="450" y="132" font-size="10" fill="#633806" text-anchor="middle">Atlantis PR flow</text>

  <rect x="670" y="44" width="200" height="100" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="770" y="66" font-size="12" font-weight="500" fill="#791F1F" text-anchor="middle">environments/prod</text>
  <text x="770" y="84" font-size="10" fill="#A32D2D" text-anchor="middle">10.2.0.0/16</text>
  <text x="770" y="100" font-size="10" fill="#A32D2D" text-anchor="middle">m5.large · 3–10 nodes</text>
  <text x="770" y="116" font-size="10" fill="#A32D2D" text-anchor="middle">NAT per AZ · 3 replica Vault</text>
  <text x="770" y="132" font-size="10" fill="#A32D2D" text-anchor="middle">Atlantis PR flow — mandatory</text>

  <!-- Arrows from envs to modules -->
  <line x1="130" y1="144" x2="130" y2="194" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="450" y1="144" x2="450" y2="194" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="770" y1="144" x2="770" y2="194" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- Modules row -->
  <rect x="30" y="196" width="154" height="116" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="107" y="218" font-size="11" font-weight="500" fill="#0C447C" text-anchor="middle">module/vpc</text>
  <text x="107" y="236" font-size="10" fill="#185FA5" text-anchor="middle">VPC · 6 subnets</text>
  <text x="107" y="252" font-size="10" fill="#185FA5" text-anchor="middle">route tables</text>
  <text x="107" y="268" font-size="10" fill="#185FA5" text-anchor="middle">1 or 3 NAT GWs</text>
  <text x="107" y="284" font-size="10" fill="#185FA5" text-anchor="middle">IGW</text>
  <text x="107" y="300" font-size="9" fill="#378ADD" text-anchor="middle">out: vpc_id, subnet_ids</text>

  <rect x="200" y="196" width="154" height="116" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="277" y="218" font-size="11" font-weight="500" fill="#0C447C" text-anchor="middle">module/eks</text>
  <text x="277" y="236" font-size="10" fill="#185FA5" text-anchor="middle">EKS cluster</text>
  <text x="277" y="252" font-size="10" fill="#185FA5" text-anchor="middle">managed node groups</text>
  <text x="277" y="268" font-size="10" fill="#185FA5" text-anchor="middle">OIDC provider</text>
  <text x="277" y="284" font-size="10" fill="#185FA5" text-anchor="middle">cluster addons</text>
  <text x="277" y="300" font-size="9" fill="#378ADD" text-anchor="middle">out: oidc_arn, cluster_name</text>

  <rect x="370" y="196" width="154" height="116" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="447" y="218" font-size="11" font-weight="500" fill="#0C447C" text-anchor="middle">module/ecr</text>
  <text x="447" y="236" font-size="10" fill="#185FA5" text-anchor="middle">ECR repository</text>
  <text x="447" y="252" font-size="10" fill="#185FA5" text-anchor="middle">immutable tags</text>
  <text x="447" y="268" font-size="10" fill="#185FA5" text-anchor="middle">lifecycle: keep 30</text>
  <text x="447" y="284" font-size="10" fill="#185FA5" text-anchor="middle">untagged: delete 1d</text>
  <text x="447" y="300" font-size="9" fill="#378ADD" text-anchor="middle">out: repository_url</text>

  <rect x="540" y="196" width="154" height="116" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="617" y="218" font-size="11" font-weight="500" fill="#0C447C" text-anchor="middle">module/iam</text>
  <text x="617" y="236" font-size="10" fill="#185FA5" text-anchor="middle">IRSA roles</text>
  <text x="617" y="252" font-size="10" fill="#185FA5" text-anchor="middle">myapp · jenkins</text>
  <text x="617" y="268" font-size="10" fill="#185FA5" text-anchor="middle">image-updater</text>
  <text x="617" y="284" font-size="10" fill="#185FA5" text-anchor="middle">alb-controller</text>
  <text x="617" y="300" font-size="9" fill="#378ADD" text-anchor="middle">out: *_role_arn</text>

  <rect x="710" y="196" width="160" height="116" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="790" y="218" font-size="11" font-weight="500" fill="#085041" text-anchor="middle">module/vault  (UPDATED)</text>
  <text x="790" y="236" font-size="10" fill="#0F6E56" text-anchor="middle">Vault Helm release</text>
  <text x="790" y="252" font-size="10" fill="#0F6E56" text-anchor="middle">KMS key (staging/prod)</text>
  <text x="790" y="268" font-size="10" fill="#0F6E56" text-anchor="middle">IRSA role for pods</text>
  <text x="790" y="284" font-size="10" fill="#0F6E56" text-anchor="middle">templatefile() helm vals</text>
  <text x="790" y="300" font-size="9" fill="#1D9E75" text-anchor="middle">out: vault_role_arn, kms_key_id</text>

  <!-- Atlantis flow -->
  <rect x="30" y="344" width="840" height="110" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text x="450" y="366" font-size="12" font-weight="500" fill="#412402" text-anchor="middle">Atlantis PR-based apply flow (staging + prod)</text>

  <rect x="50" y="376" width="140" height="64" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="120" y="398" font-size="10" font-weight="500" fill="#412402" text-anchor="middle">1. Raise PR</text>
  <text x="120" y="414" font-size="9" fill="#633806" text-anchor="middle">change terraform/</text>
  <text x="120" y="428" font-size="9" fill="#633806" text-anchor="middle">environments/prod</text>

  <rect x="210" y="376" width="140" height="64" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="280" y="398" font-size="10" font-weight="500" fill="#412402" text-anchor="middle">2. Atlantis plans</text>
  <text x="280" y="414" font-size="9" fill="#633806" text-anchor="middle">terraform plan</text>
  <text x="280" y="428" font-size="9" fill="#633806" text-anchor="middle">posted as PR comment</text>

  <rect x="370" y="376" width="140" height="64" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="440" y="398" font-size="10" font-weight="500" fill="#412402" text-anchor="middle">3. Review</text>
  <text x="440" y="414" font-size="9" fill="#633806" text-anchor="middle">code diff + plan</text>
  <text x="440" y="428" font-size="9" fill="#633806" text-anchor="middle">reviewed together</text>

  <rect x="530" y="376" width="140" height="64" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="600" y="398" font-size="10" font-weight="500" fill="#412402" text-anchor="middle">4. atlantis apply</text>
  <text x="600" y="414" font-size="9" fill="#633806" text-anchor="middle">comment on PR</text>
  <text x="600" y="428" font-size="9" fill="#633806" text-anchor="middle">Atlantis applies</text>

  <rect x="690" y="376" width="160" height="64" rx="6" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="770" y="398" font-size="10" font-weight="500" fill="#27500A" text-anchor="middle">5. Merge PR</text>
  <text x="770" y="414" font-size="9" fill="#3B6D11" text-anchor="middle">S3 state updated</text>
  <text x="770" y="428" font-size="9" fill="#3B6D11" text-anchor="middle">DynamoDB lock released</text>

  <line x1="190" y1="408" x2="208" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="350" y1="408" x2="368" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="510" y1="408" x2="528" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="670" y1="408" x2="688" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <text x="450" y="468" font-size="12" font-weight="500" fill="#5F5E5A" text-anchor="middle">Terraform modules (self-contained) called from environment entrypoints · Atlantis for staging/prod</text>
</svg>
