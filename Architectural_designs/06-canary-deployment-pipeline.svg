<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#639922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="26" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Argo Rollouts — production canary strategy</text>

  <!-- ALB traffic source -->
  <rect x="360" y="44" width="180" height="40" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="450" y="69" font-size="12" font-weight="500" fill="#0C447C" text-anchor="middle">ALB — production traffic</text>

  <!-- Steps row -->
  <!-- Step 1: 10% -->
  <rect x="30" y="130" width="120" height="80" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="90" y="154" font-size="11" font-weight="500" fill="#412402" text-anchor="middle">Step 1</text>
  <text x="90" y="172" font-size="22" font-weight="500" fill="#BA7517" text-anchor="middle">10%</text>
  <text x="90" y="200" font-size="10" fill="#633806" text-anchor="middle">canary pods</text>

  <!-- Step 2: Analysis -->
  <rect x="176" y="130" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="236" y="154" font-size="11" font-weight="500" fill="#3C3489" text-anchor="middle">Step 2</text>
  <text x="236" y="170" font-size="11" font-weight="500" fill="#534AB7" text-anchor="middle">Analysis 5min</text>
  <text x="236" y="186" font-size="9" fill="#534AB7" text-anchor="middle">smoke test</text>
  <text x="236" y="198" font-size="9" fill="#534AB7" text-anchor="middle">success ≥99%</text>
  <text x="236" y="210" font-size="9" fill="#534AB7" text-anchor="middle">p99 ≤500ms</text>

  <!-- Step 3: Pause -->
  <rect x="322" y="130" width="100" height="80" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="372" y="154" font-size="11" font-weight="500" fill="#444441" text-anchor="middle">Step 3</text>
  <text x="372" y="174" font-size="11" font-weight="500" fill="#5F5E5A" text-anchor="middle">Pause</text>
  <text x="372" y="192" font-size="11" font-weight="500" fill="#5F5E5A" text-anchor="middle">2 min</text>
  <text x="372" y="208" font-size="9" fill="#888780" text-anchor="middle">bake time</text>

  <!-- Step 4: 50% -->
  <rect x="448" y="130" width="120" height="80" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="508" y="154" font-size="11" font-weight="500" fill="#412402" text-anchor="middle">Step 4</text>
  <text x="508" y="172" font-size="22" font-weight="500" fill="#BA7517" text-anchor="middle">50%</text>
  <text x="508" y="200" font-size="10" fill="#633806" text-anchor="middle">canary pods</text>

  <!-- Step 5: Analysis -->
  <rect x="594" y="130" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="654" y="154" font-size="11" font-weight="500" fill="#3C3489" text-anchor="middle">Step 5</text>
  <text x="654" y="170" font-size="11" font-weight="500" fill="#534AB7" text-anchor="middle">Analysis 5min</text>
  <text x="654" y="186" font-size="9" fill="#534AB7" text-anchor="middle">smoke test</text>
  <text x="654" y="198" font-size="9" fill="#534AB7" text-anchor="middle">success ≥99%</text>
  <text x="654" y="210" font-size="9" fill="#534AB7" text-anchor="middle">p99 ≤500ms</text>

  <!-- Step 6: Pause -->
  <rect x="740" y="130" width="100" height="80" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="790" y="154" font-size="11" font-weight="500" fill="#444441" text-anchor="middle">Step 6</text>
  <text x="790" y="174" font-size="11" font-weight="500" fill="#5F5E5A" text-anchor="middle">Pause</text>
  <text x="790" y="192" font-size="11" font-weight="500" fill="#5F5E5A" text-anchor="middle">5 min</text>
  <text x="790" y="208" font-size="9" fill="#888780" text-anchor="middle">bake time</text>

  <!-- Arrows between steps -->
  <line x1="150" y1="170" x2="174" y2="170" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="296" y1="170" x2="320" y2="170" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="422" y1="170" x2="446" y2="170" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="568" y1="170" x2="592" y2="170" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="714" y1="170" x2="738" y2="170" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 7: 100% -->
  <rect x="340" y="290" width="220" height="60" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="450" y="315" font-size="13" font-weight="500" fill="#27500A" text-anchor="middle">Step 7 — 100% rollout</text>
  <text x="450" y="335" font-size="10" fill="#3B6D11" text-anchor="middle">old pods terminated · deployment complete</text>

  <!-- Rollback box -->
  <rect x="600" y="290" width="270" height="80" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="735" y="314" font-size="12" font-weight="500" fill="#791F1F" text-anchor="middle">Automatic rollback</text>
  <text x="735" y="332" font-size="10" fill="#A32D2D" text-anchor="middle">analysis fails at step 2 or 5</text>
  <text x="735" y="348" font-size="10" fill="#A32D2D" text-anchor="middle">100% traffic → stable immediately</text>
  <text x="735" y="364" font-size="10" fill="#A32D2D" text-anchor="middle">RolloutAborted alert fires in &lt;1 min</text>

  <!-- Analysis detail -->
  <rect x="30" y="290" width="290" height="140" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="175" y="312" font-size="11" font-weight="500" fill="#3C3489" text-anchor="middle">AnalysisTemplate metrics</text>
  <rect x="46" y="320" width="258" height="28" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="175" y="334" font-size="10" fill="#26215C" text-anchor="middle">1. Smoke test — 60 curl /health requests</text>
  <text x="175" y="344" font-size="9" fill="#534AB7" text-anchor="middle">curlimages/curl job · must all return 200</text>
  <rect x="46" y="352" width="258" height="28" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="175" y="366" font-size="10" fill="#26215C" text-anchor="middle">2. Success rate ≥ 99%</text>
  <text x="175" y="376" font-size="9" fill="#534AB7" text-anchor="middle">Prometheus · inconclusiveLimit: 1</text>
  <rect x="46" y="384" width="258" height="28" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="175" y="398" font-size="10" fill="#26215C" text-anchor="middle">3. p99 latency ≤ 500ms</text>
  <text x="175" y="408" font-size="9" fill="#534AB7" text-anchor="middle">Prometheus · inconclusiveLimit: 1</text>
  <text x="175" y="424" font-size="9" fill="#888780" text-anchor="middle">smoke test runs first — guarantees Prometheus has data</text>

  <!-- ALB to steps -->
  <line x1="420" y1="84" x2="90" y2="128" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="450" y1="84" x2="450" y2="128" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="480" y1="84" x2="790" y2="128" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- Step 6 to step 7 -->
  <path d="M790 210 L790 260 L450 260 L450 288" stroke="#639922" stroke-width="1.2" fill="none" marker-end="url(#arr-green)"/>
  <text x="640" y="255" font-size="10" fill="#3B6D11">all steps passed</text>

  <!-- Analysis fail to rollback -->
  <path d="M236 210 L236 260 L654 260" stroke="#E24B4A" stroke-width="1.2" fill="none" stroke-dasharray="4 2" marker-end="url(#arr-red)"/>
  <text x="420" y="275" font-size="10" fill="#A32D2D" text-anchor="middle">analysis failure at step 2 or 5</text>
  <line x1="714" y1="330" x2="600" y2="330" stroke="#E24B4A" stroke-width="1" fill="none" marker-end="url(#arr-red)"/>

  <text x="450" y="500" font-size="12" font-weight="500" fill="#5F5E5A" text-anchor="middle">Argo Rollouts canary — 7 steps, 2 analysis gates, automatic rollback on metric failure</text>
</svg>
