<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="26" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Vault secrets injection — sidecar pattern</text>

  <!-- KMS -->
  <rect x="30" y="54" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="110" y="77" font-size="12" font-weight="500" fill="#0C447C" text-anchor="middle">AWS KMS</text>
  <text x="110" y="95" font-size="10" fill="#185FA5" text-anchor="middle">auto-unseal key</text>
  <text x="110" y="107" font-size="10" fill="#185FA5" text-anchor="middle">staging + prod only</text>

  <!-- Vault HA -->
  <rect x="240" y="44" width="300" height="140" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="390" y="66" font-size="12" font-weight="500" fill="#085041" text-anchor="middle">Vault HA (Raft, 3 replicas)</text>
  <rect x="256" y="74" width="80" height="96" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="296" y="98" font-size="10" font-weight="500" fill="#04342C" text-anchor="middle">vault-0</text>
  <text x="296" y="114" font-size="9" fill="#085041" text-anchor="middle">leader</text>
  <text x="296" y="130" font-size="9" fill="#085041" text-anchor="middle">Raft log</text>
  <text x="296" y="146" font-size="9" fill="#085041" text-anchor="middle">10Gi gp3</text>
  <text x="296" y="162" font-size="9" fill="#085041" text-anchor="middle">AZ-1</text>
  <rect x="350" y="74" width="80" height="96" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="390" y="98" font-size="10" font-weight="500" fill="#04342C" text-anchor="middle">vault-1</text>
  <text x="390" y="114" font-size="9" fill="#085041" text-anchor="middle">standby</text>
  <text x="390" y="130" font-size="9" fill="#085041" text-anchor="middle">Raft log</text>
  <text x="390" y="146" font-size="9" fill="#085041" text-anchor="middle">10Gi gp3</text>
  <text x="390" y="162" font-size="9" fill="#085041" text-anchor="middle">AZ-2</text>
  <rect x="444" y="74" width="80" height="96" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="484" y="98" font-size="10" font-weight="500" fill="#04342C" text-anchor="middle">vault-2</text>
  <text x="484" y="114" font-size="9" fill="#085041" text-anchor="middle">standby</text>
  <text x="484" y="130" font-size="9" fill="#085041" text-anchor="middle">Raft log</text>
  <text x="484" y="146" font-size="9" fill="#085041" text-anchor="middle">10Gi gp3</text>
  <text x="484" y="162" font-size="9" fill="#085041" text-anchor="middle">AZ-3</text>

  <!-- K8s auth backend -->
  <rect x="596" y="54" width="270" height="80" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="731" y="76" font-size="12" font-weight="500" fill="#085041" text-anchor="middle">Vault K8s auth backend</text>
  <text x="731" y="94" font-size="10" fill="#0F6E56" text-anchor="middle">validates pod ServiceAccount JWT</text>
  <text x="731" y="110" font-size="10" fill="#0F6E56" text-anchor="middle">issues Vault token scoped to policy</text>
  <text x="731" y="124" font-size="10" fill="#0F6E56" text-anchor="middle">bound_service_account_namespaces</text>

  <!-- Pod with sidecar -->
  <rect x="100" y="260" width="680" height="190" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="440" y="282" font-size="12" font-weight="500" fill="#412402" text-anchor="middle">Application pod (myapp namespace)</text>

  <!-- Vault agent sidecar -->
  <rect x="120" y="292" width="280" height="140" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="260" y="314" font-size="11" font-weight="500" fill="#085041" text-anchor="middle">vault-agent (sidecar)</text>
  <text x="260" y="330" font-size="10" fill="#0F6E56" text-anchor="middle">injected via pod annotations</text>
  <rect x="136" y="338" width="248" height="26" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="260" y="355" font-size="10" fill="#04342C" text-anchor="middle">authenticates to Vault (K8s auth)</text>
  <rect x="136" y="370" width="248" height="26" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="260" y="387" font-size="10" fill="#04342C" text-anchor="middle">reads secrets from Vault KV</text>
  <rect x="136" y="402" width="248" height="26" rx="4" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="260" y="419" font-size="10" fill="#04342C" text-anchor="middle">writes to /vault/secrets/ as files</text>

  <!-- App container -->
  <rect x="440" y="292" width="320" height="140" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="600" y="314" font-size="11" font-weight="500" fill="#412402" text-anchor="middle">myapp container</text>
  <rect x="456" y="322" width="288" height="26" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="600" y="339" font-size="10" fill="#412402" text-anchor="middle">reads /vault/secrets/db-password</text>
  <rect x="456" y="354" width="288" height="26" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="600" y="371" font-size="10" fill="#412402" text-anchor="middle">reads /vault/secrets/api-key</text>
  <rect x="456" y="386" width="288" height="26" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="600" y="403" font-size="10" fill="#412402" text-anchor="middle">NO env vars — files only</text>
  <rect x="456" y="418" width="288" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="600" y="434" font-size="10" fill="#633806" text-anchor="middle">not visible in kubectl describe</text>

  <!-- KMS to Vault -->
  <line x1="190" y1="82" x2="238" y2="114" stroke="#378ADD" stroke-width="1.2" fill="none" marker-end="url(#arr-blue)"/>
  <text x="192" y="112" font-size="10" fill="#185FA5">unseal</text>

  <!-- Vault to K8s auth -->
  <line x1="540" y1="94" x2="594" y2="94" stroke="#1D9E75" stroke-width="1.2" fill="none" marker-end="url(#arr-teal)"/>

  <!-- K8s auth to sidecar -->
  <path d="M731 134 L731 200 L260 200 L260 258" stroke="#1D9E75" stroke-width="1.2" fill="none" marker-end="url(#arr-teal)"/>
  <text x="500" y="195" font-size="10" fill="#0F6E56">Vault token issued</text>

  <!-- Vault to sidecar (secrets) -->
  <path d="M390 184 L390 230 L260 230 L260 258" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="4 2" fill="none" marker-end="url(#arr-teal)"/>
  <text x="330" y="224" font-size="10" fill="#0F6E56">secrets</text>

  <!-- Sidecar to app (shared volume) -->
  <line x1="400" y1="362" x2="438" y2="362" stroke="#BA7517" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <text x="419" y="355" font-size="9" fill="#633806" text-anchor="middle">shared</text>
  <text x="419" y="375" font-size="9" fill="#633806" text-anchor="middle">volume</text>

  <text x="450" y="476" font-size="12" font-weight="500" fill="#5F5E5A" text-anchor="middle">Vault secrets flow — K8s auth → sidecar injection → files (never env vars)</text>
</svg>
