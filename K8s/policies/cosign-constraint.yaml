# k8s/policies/cosign-constraint.yaml
#
# Activates the RequireCosignSignature constraint for the prod and staging
# namespaces. Dev is excluded — unsigned images may be used during local
# development and feature branch testing.
#
# To get your public key value:
#   cat cosign.pub | base64 -w0
# The key is generated by: cosign generate-key-pair
# The private key lives in Jenkins credentials; the public key is safe to
# commit and is referenced here.
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: RequireCosignSignature
metadata:
  name: require-signed-images
  annotations:
    description: >
      All images deployed to staging and prod must carry a valid Cosign
      signature. Unsigned images are rejected at admission.
spec:
  enforcementAction: deny     # Use "warn" first when rolling this out to an
                               # existing cluster — switch to "deny" once all
                               # existing images are signed.
  match:
    scope: Namespaced
    namespaces:
      - staging
      - prod
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "ReplicaSet", "StatefulSet", "DaemonSet"]
      - apiGroups: ["argoproj.io"]
        kinds: ["Rollout"]

  parameters:
    # Replace with your actual base64-encoded public key.
    # Generate with: cosign generate-key-pair && cat cosign.pub | base64 -w0
    publicKey: "REPLACE_WITH_BASE64_ENCODED_COSIGN_PUBLIC_KEY"

    # Only enforce on images from your ECR registry.
    # Replace ACCOUNT_ID and REGION with real values.
    registryPrefix: "ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/myapp"