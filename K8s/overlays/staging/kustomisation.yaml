# k8s/overlays/staging/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - poddisruptionbudget.yaml    # added — protects against zero-replica node drains

namespace: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: myapp

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
    target:
      kind: HorizontalPodAutoscaler
      name: myapp

  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.myapp.example.com
    target:
      kind: Ingress
      name: myapp